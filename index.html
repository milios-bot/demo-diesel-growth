<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diesel Dispatch Network — Client Portal</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: #fff;
}

header {
  padding: 20px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.status {
  font-size: 12px;
  color: #22c55e;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.card {
  background: #111;
  border: 1px solid #222;
  padding: 16px;
  margin-bottom: 14px;
  border-radius: 10px;
}

.title {
  font-size: 18px;
  margin-bottom: 6px;
}

.label {
  color: #888;
  font-size: 13px;
}

.login {
  max-width: 320px;
  margin: 120px auto;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #111;
  border: 1px solid #333;
  color: #fff;
}

button {
  width: 100%;
  padding: 10px;
  background: #d97706;
  border: none;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #222;
  text-align: left;
}

th {
  color: #aaa;
  font-size: 12px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
  <h2>Secure Portal Access</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Access</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
  <div>
    <div>Diesel Dispatch Network</div>
    <div class="status">● SYSTEM ACTIVE</div>
  </div>
  <div>Client Command Center</div>
</header>

<div class="container">

  <div class="card">
    <div class="title">Live Operations</div>
    <div class="label">Real-time dispatch activity</div>
  </div>

  <div class="card">
    <div class="title">Active Jobs</div>

    <table>
      <thead>
        <tr>
          <th>Job ID</th>
          <th>Company</th>
          <th>Issue</th>
          <th>Tech</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="jobsTable"></tbody>
    </table>

  </div>

</div>

</div>

<script>

// SIMPLE AUTH (replace later with real backend)
const USERS = {
  "owner": "admin123",
  "dispatch": "dispatch123"
};

function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (USERS[u] && USERS[u] === p) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    alert("Invalid credentials");
  }
}

// SAMPLE JOB DATA (replace with API later)
const JOBS = [
  {
    id: "JOB-9012",
    company: "Atlas Freight",
    issue: "Engine derate",
    tech: "Miguel",
    status: "Assigned"
  },
  {
    id: "JOB-9011",
    company: "Westline Logistics",
    issue: "Brake air leak",
    tech: "Samir",
    status: "In Progress"
  },
  {
    id: "JOB-9010",
    company: "Prime Haul",
    issue: "Overheating",
    tech: "Derek",
    status: "Completed"
  }
];

// RENDER JOBS
function loadJobs() {
  const table = document.getElementById("jobsTable");
  table.innerHTML = "";

  JOBS.forEach(j => {
    table.innerHTML += `
      <tr>
        <td>${j.id}</td>
        <td>${j.company}</td>
        <td>${j.issue}</td>
        <td>${j.tech}</td>
        <td>${j.status}</td>
      </tr>
    `;
  });
}

loadJobs();

</script>

</body>
</html>
